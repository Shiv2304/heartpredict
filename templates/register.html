{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg animate-slide-up">
    <h2 class="text-2xl font-bold text-red-700 mb-4">Register</h2>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-medium">Full Name</label>
            <input type="text" name="name" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('name', '') }}" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-medium">Username</label>
            <input type="text" name="username" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('username', '') }}" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-medium">Email</label>
            <input type="email" name="email" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" value="{{ request.form.get('email', '') }}" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-medium">Age</label>
            <input type="number" name="age" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="1" value="{{ request.form.get('age', '') }}" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-medium">Gender</label>
            <select name="gender" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-medium">Password</label>
            <input type="password" name="password" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" required>
        </div>
        <div class="mb-4">
            <label class="flex items-center">
                <input type="checkbox" name="terms" class="mr-2" required>
                <span class="text-gray-700">I agree to the <a href="#" class="text-red-700 hover:underline">Terms of Service</a></span>
            </label>
        </div>
        <button type="submit" class="w-full bg-red-700 text-white p-2 rounded hover:bg-red-800 transition-colors duration-300">Register</button>
    </form>
    <p class="mt-4 text-center text-gray-600">Already have an account? <a href="{{ url_for('login') }}" class="text-red-700 hover:underline">Login</a></p>
</div>
{% endblock %}
