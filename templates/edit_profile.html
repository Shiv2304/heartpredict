{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold text-teal-600 mb-4">Edit Profile</h2>
    <form method="POST" action="">
        <div class="mb-4">
            <label class="block text-gray-700">Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" class="w-full p-2 border rounded" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Email</label>
            <input type="email" name="email" value="{{ user.email }}" class="w-full p-2 border rounded" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Age</label>
            <input type="number" name="age" value="{{ user.age }}" class="w-full p-2 border rounded" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Gender</label>
            <select name="gender" class="w-full p-2 border rounded" required>
                <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if user.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        <button type="submit" class="bg-teal-600 text-white p-2 rounded hover:bg-teal-700 transition-colors duration-300">Save Changes</button>
    </form>
</div>
{% endblock %}
