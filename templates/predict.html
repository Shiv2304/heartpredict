{% extends "base.html" %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white p-6 rounded-lg shadow-lg animate-slide-up">
        <h2 class="text-2xl font-bold text-red-700 mb-4">Heart Disease Prediction</h2>
        
        <form method="POST">
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-gray-700 font-medium">Age</label>
                    <input type="number" name="age" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('age', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Sex (1 = Male, 0 = Female)</label>
                    <input type="number" name="sex" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="1" value="{{ request.form.get('sex', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Chest Pain Type (0-3)</label>
                    <input type="number" name="chest_pain_type" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="3" value="{{ request.form.get('chest_pain_type', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Resting Blood Pressure (mm Hg)</label>
                    <input type="number" name="resting_bp" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('resting_bp', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Cholesterol (mg/dl)</label>
                    <input type="number" name="cholesterol" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('cholesterol', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Fasting Blood Sugar > 120 mg/dl (1 = True, 0 = False)</label>
                    <input type="number" name="fasting_bs" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="1" value="{{ request.form.get('fasting_bs', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Resting ECG (0-2)</label>
                    <input type="number" name="resting_ecg" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="2" value="{{ request.form.get('resting_ecg', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Maximum Heart Rate</label>
                    <input type="number" name="max_heart_rate" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('max_heart_rate', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Exercise-Induced Angina (0-1)</label>
                    <input type="number" name="exercise_angina" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="1" value="{{ request.form.get('exercise_angina', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Oldpeak (ST Depression)</label>
                    <input type="number" name="oldpeak" step="0.1" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" value="{{ request.form.get('oldpeak', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Slope of Peak Exercise ST (0-2)</label>
                    <input type="number" name="slope" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="2" value="{{ request.form.get('slope', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Number of Major Vessels (0-3)</label>
                    <input type="number" name="ca" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="3" value="{{ request.form.get('ca', '') }}" required>
                </div>
                <div>
                    <label class="block text-gray-700 font-medium">Thalassemia (0-3)</label>
                    <input type="number" name="thal" class="w-full p-2 border rounded focus:border-red-700 focus:outline-none transition-colors duration-200" min="0" max="3" value="{{ request.form.get('thal', '') }}" required>
                </div>
            </div>
            <button type="submit" class="w-full mt-4 bg-red-700 text-white p-2 rounded hover:bg-red-800 transition-colors duration-300">Predict</button>
        </form>
    </div>
    <div class="bg-white p-6 rounded-lg shadow-lg animate-slide-up">
        <h2 class="text-2xl font-bold text-red-700 mb-4">Prediction Result</h2>
        <p class="text-gray-600">Fill the form and click 'Predict' to see the result.</p>
    </div>
</div>
{% endblock %}
