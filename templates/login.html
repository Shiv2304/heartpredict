{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg mt-10">
    <h2 class="text-2xl font-bold text-red-700 mb-4">Login to HeartPredict</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-4 p-2 rounded"
                     {% if category == 'error' %}
                         class="bg-red-100 border border-red-400 text-red-700"
                     {% else %}
                         class="bg-green-100 border border-green-400 text-green-700"
                     {% endif %}>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="POST" action="">
        <div class="mb-4">
            <label class="block text-gray-700">Username</label>
            <input type="text" name="username" class="w-full p-2 border rounded" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700">Password</label>
            <input type="password" name="password" class="w-full p-2 border rounded" required>
        </div>
        <button type="submit" class="w-full bg-red-700 text-white p-2 rounded hover:bg-red-800 transition-colors duration-300">Login</button>
    </form>
    <p class="mt-4 text-gray-600">Don't have an account? <a href="{{ url_for('register') }}" class="text-red-700 hover:underline">Register</a></p>
</div>
{% endblock %}
